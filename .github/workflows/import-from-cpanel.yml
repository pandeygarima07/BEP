name: Import from cPanel via FTP

on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ftp-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Download files from cPanel via FTP
        run: |
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" ${{ secrets.FTP_HOST }} -e "set ftp:ssl-allow no; set ftp:passive-mode true; mirror /public_html/BEP ./BEP; bye"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Import BEP from cPanel via FTP"
          git push
